name: PR Review
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript type check
        id: typecheck
        continue-on-error: true
        run: |
          echo "## TypeScript 类型检查" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pnpm type-check 2>&1 | tee typecheck-output.txt || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run ESLint
        id: lint
        continue-on-error: true
        run: |
          echo "## ESLint 代码检查" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pnpm lint 2>&1 | tee lint-output.txt || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run tests
        id: test
        continue-on-error: true
        run: |
          echo "## 单元测试" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pnpm test 2>&1 | tee test-output.txt || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Collect check results
        id: results
        run: |
          # 收集所有检查结果
          {
            echo "TYPECHECK_RESULT<<EOF"
            cat typecheck-output.txt 2>/dev/null || echo "No output"
            echo "EOF"
            echo "LINT_RESULT<<EOF"
            cat lint-output.txt 2>/dev/null || echo "No output"
            echo "EOF"
            echo "TEST_RESULT<<EOF"
            cat test-output.txt 2>/dev/null || echo "No output"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Run OpenCode Review
        uses: anomalyco/opencode/github@latest
        env:
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TYPECHECK_RESULT: ${{ env.TYPECHECK_RESULT }}
          LINT_RESULT: ${{ env.LINT_RESULT }}
          TEST_RESULT: ${{ env.TEST_RESULT }}
        with:
          model: bailian/qwen3.5-plus
          use_github_token: true
          prompt: |
            请审查这个 Pull Request：
            
            ## 自动检查结果
            
            ### TypeScript 类型检查
            ```
            ${{ env.TYPECHECK_RESULT }}
            ```
            
            ### ESLint 代码检查
            ```
            ${{ env.LINT_RESULT }}
            ```
            
            ### 单元测试
            ```
            ${{ env.TEST_RESULT }}
            ```
            
            ---
            
            ## 审查要点
            
            ### 1. 检查结果分析
            - 分析类型检查、ESLint、测试的结果
            - 识别关键问题并优先处理
            
            ### 2. 代码质量
            - 代码是否清晰易读
            - 是否遵循项目的编码规范
            - 是否有重复代码可以重构
            
            ### 3. 潜在问题
            - 是否有潜在的 Bug 或逻辑错误
            - 是否有安全风险（如 SQL 注入、XSS 等）
            - 是否有性能问题
            
            ### 4. 最佳实践
            - 是否遵循 TypeScript/JavaScript 最佳实践
            - 是否正确使用了框架提供的功能
            - 错误处理是否完善
            
            ### 5. 测试覆盖
            - 是否需要添加单元测试
            - 边界情况是否考虑
            
            ---
            
            ## 服务端组件专项审查
            
            如果此 PR 涉及以下目录，请按 Aiko Boot 插件开发规范进行审查：
            - `packages/aiko-boot/` - 核心框架
            - `packages/aiko-boot-starter-*/` - Starter 插件
            - `packages/aiko-boot-codegen/` - 代码生成器
            
            ### 命名规范检查
            - 包名是否符合 `@ai-partner-x/aiko-boot-starter-{功能}` 格式
            - 配置前缀是否简短有意义（如 database, redis, mq）
            - 自动配置类命名是否为 `{Feature}AutoConfiguration`
            - 配置属性类命名是否为 `{Feature}Properties`
            
            ### 条件装配检查
            - 是否使用 `@ConditionalOnProperty` 让用户可控启用/禁用
            - 是否使用 `@ConditionalOnMissingBean` 允许用户覆盖默认实现
            - 条件表达式是否合理
            
            ### 生命周期检查
            - 初始化是否使用 `@OnApplicationReady`，order 负数优先
            - 清理是否使用 `@OnApplicationShutdown`，order 正数延后
            - 是否正确处理异步操作
            
            ### 类型扩展检查
            - 是否提供 `config-augment.ts` 扩展 `AppConfig` 接口
            - 类型定义是否完整，让用户的 `app.config.ts` 有智能提示
            
            ### 日志输出检查
            - 是否使用 emoji 前缀标识模块（如 `🗄️ [aiko-orm]`）
            - 关键操作是否输出日志便于调试
            - 错误日志是否清晰
            
            ### 导出规范检查
            - `index.ts` 是否正确导出所有公共 API
            - 是否导出 `@AutoConfiguration` 标记的类
            - 是否导出类型扩展
            
            ---
            
            ## 输出格式
            
            ### 🔴 必须修复
            列出类型错误、测试失败、违反核心规范等必须修复的问题
            
            ### 🟡 建议改进  
            列出 ESLint 警告、代码风格问题、规范优化建议
            
            ### ✅ 优点
            列出代码的优点，符合规范的地方
            
            ### 💡 建议
            其他建议和修复方案，包含具体代码示例
            
            请用中文回复。
