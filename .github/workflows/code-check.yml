name: Code Quality Check
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  check:
    if: |
      contains(github.event.comment.body, '/oc check all') ||
      contains(github.event.comment.body, '/opencode check all')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript type check
        id: typecheck
        continue-on-error: true
        run: |
          echo "## TypeScript 类型检查" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pnpm type-check 2>&1 | tee typecheck-output.txt || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run ESLint
        id: lint
        continue-on-error: true
        run: |
          echo "## ESLint 代码检查" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pnpm lint 2>&1 | tee lint-output.txt || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run tests
        id: test
        continue-on-error: true
        run: |
          echo "## 单元测试" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pnpm test 2>&1 | tee test-output.txt || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Collect check results
        id: results
        run: |
          # 收集所有检查结果
          {
            echo "TYPECHECK_RESULT<<EOF"
            cat typecheck-output.txt 2>/dev/null || echo "No output"
            echo "EOF"
            echo "LINT_RESULT<<EOF"
            cat lint-output.txt 2>/dev/null || echo "No output"
            echo "EOF"
            echo "TEST_RESULT<<EOF"
            cat test-output.txt 2>/dev/null || echo "No output"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Run OpenCode Analysis
        uses: anomalyco/opencode/github@latest
        env:
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TYPECHECK_RESULT: ${{ env.TYPECHECK_RESULT }}
          LINT_RESULT: ${{ env.LINT_RESULT }}
          TEST_RESULT: ${{ env.TEST_RESULT }}
        with:
          model: bailian/qwen3.5-plus
          use_github_token: true
          prompt: |
            请分析以下代码检查结果并提供改进建议：
            
            ## TypeScript 类型检查结果
            
            ```
            ${{ env.TYPECHECK_RESULT }}
            ```
            
            ## ESLint 检查结果
            
            ```
            ${{ env.LINT_RESULT }}
            ```
            
            ## 单元测试结果
            
            ```
            ${{ env.TEST_RESULT }}
            ```
            
            ## 分析要求
            
            请根据以上检查结果：
            
            1. **问题汇总** - 列出所有发现的问题
            2. **优先级排序** - 按严重程度排序（必须修复 > 建议修复 > 可选优化）
            3. **修复建议** - 为每个问题提供具体的修复方案
            4. **代码示例** - 提供修复后的代码示例
            
            ## 输出格式
            
            ### 🔴 必须修复
            列出类型错误、测试失败等必须修复的问题
            
            ### 🟡 建议修复  
            列出 ESLint 警告、代码风格问题
            
            ### 🟢 可选优化
            列出可以改进但不影响功能的地方
            
            ### 📝 修复方案
            提供具体的代码修改建议
            
            请用中文回复。
